---
version: 2

project_name: obsidian-crdt-sync-server

before:
  hooks:
    - bun install --frozen-lockfile
    - bun run build

builds:
  - id: server-assets
    builder: bun
    main: src/index.ts
    binary: ignored
    skip: true

changelog:
  sort: asc
  abbrev: -1
  filters:
    exclude:
      - "^Release:"
      - "^Merge "

release:
  github:
    owner: yegor-usoltsev
    name: obsidian-crdt-sync-server
  name_template: "{{ .Version }}"
  footer: |
    ## Docker images

    Docker Hub:
    - [`yusoltsev/obsidian-crdt-sync-server:{{ .Version }}`](https://hub.docker.com/r/yusoltsev/obsidian-crdt-sync-server/tags?name={{ .Version }})
    - [`yusoltsev/obsidian-crdt-sync-server:{{ .Major }}.{{ .Minor }}`](https://hub.docker.com/r/yusoltsev/obsidian-crdt-sync-server/tags?name={{ .Major }}.{{ .Minor }})
    - [`yusoltsev/obsidian-crdt-sync-server:{{ .Major }}`](https://hub.docker.com/r/yusoltsev/obsidian-crdt-sync-server/tags?name={{ .Major }})
    - [`yusoltsev/obsidian-crdt-sync-server:latest`](https://hub.docker.com/r/yusoltsev/obsidian-crdt-sync-server/tags?name=latest)

    GHCR:
    - [`ghcr.io/yegor-usoltsev/obsidian-crdt-sync-server:{{ .Version }}`](https://github.com/yegor-usoltsev/obsidian-crdt-sync-server/pkgs/container/obsidian-crdt-sync-server)
    - [`ghcr.io/yegor-usoltsev/obsidian-crdt-sync-server:{{ .Major }}.{{ .Minor }}`](https://github.com/yegor-usoltsev/obsidian-crdt-sync-server/pkgs/container/obsidian-crdt-sync-server)
    - [`ghcr.io/yegor-usoltsev/obsidian-crdt-sync-server:{{ .Major }}`](https://github.com/yegor-usoltsev/obsidian-crdt-sync-server/pkgs/container/obsidian-crdt-sync-server)
    - [`ghcr.io/yegor-usoltsev/obsidian-crdt-sync-server:latest`](https://github.com/yegor-usoltsev/obsidian-crdt-sync-server/pkgs/container/obsidian-crdt-sync-server)
  extra_files:
    - glob: ./main.js

dockers_v2:
  - id: server-image
    dockerfile: Dockerfile
    images:
      - yusoltsev/obsidian-crdt-sync-server
      - ghcr.io/yegor-usoltsev/obsidian-crdt-sync-server
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ .Major }}"
      - "latest"
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.description: "Self-hosted WebSocket server for obsidian-crdt-sync"
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.version: "{{ .Version }}"
    extra_files:
      - ./main.js
    platforms:
      - linux/amd64
      - linux/arm64
